# openFinance — full stack deployment in a single compose file.
#
# Recommended: run the one-shot deploy script, which checks for Docker,
# generates secrets into .env, builds, and starts everything:
#
#   ./scripts/deploy.sh
#
# Then open http://localhost:3002 and register your account.
#
# Stack: web (Nginx + React UI, port 3002) → server (Hono API) → postgres.
# Database data and uploaded documents persist in named volumes.
# The AI assistant's Ollama endpoint is configured at runtime from the
# in-app Settings page (defaults to http://localhost:11434).
#
# Requires Docker Compose v2.23.1+ (inline dockerfiles + inline configs).

name: openfinance

services:
  server:
    build:
      context: .
      dockerfile_inline: |
        FROM node:22-bookworm-slim AS builder

        ENV COREPACK_ENABLE_DOWNLOAD_PROMPT=0
        RUN corepack enable

        WORKDIR /repo

        # Install dependencies first so source edits don't bust the layer cache
        COPY package.json pnpm-lock.yaml pnpm-workspace.yaml tsconfig.base.json ./
        COPY apps/server/package.json apps/server/
        COPY packages/shared/package.json packages/shared/
        RUN pnpm install --frozen-lockfile --filter @openfinance/server...

        COPY packages/shared packages/shared
        COPY apps/server apps/server
        # Produces a fully self-contained bundle — no node_modules at runtime
        RUN pnpm --filter @openfinance/server bundle

        FROM node:22-bookworm-slim
        ENV NODE_ENV=production
        WORKDIR /app
        COPY --from=builder /repo/apps/server/dist/sidecar/index.js /app/
        RUN mkdir -p /app/uploads /app/chat-memories && chown -R node:node /app
        USER node
        EXPOSE 3001
        CMD ["node", "index.js"]
    environment:
      JWT_SECRET: ${JWT_SECRET:?Run ./scripts/deploy.sh to generate .env}
      # At-rest AES-256-GCM encryption for uploaded documents and chat
      # memories. Losing this key makes those files unreadable — keep .env safe.
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:?Run ./scripts/deploy.sh to generate .env}
      PORT: 3001
      DATABASE_URL: postgres://${POSTGRES_USER:-openfinance}:${POSTGRES_PASSWORD:?Run ./scripts/deploy.sh to generate .env}@postgres:5432/${POSTGRES_DB:-openfinance}
      # Optional overrides for the AI assistant defaults; normally configured
      # at runtime from the in-app Settings page instead.
      OLLAMA_URL: ${OLLAMA_URL:-}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-}
    volumes:
      # Uploaded documents (bank statements, contract notes, …)
      - uploads:/app/uploads
      # AI conversation memory files
      - chat-memories:/app/chat-memories
    extra_hosts:
      # Lets the container reach services on the Docker host via
      # host.docker.internal (e.g. an Ollama instance running on the host)
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD
        - node
        - -e
        - fetch('http://127.0.0.1:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    restart: unless-stopped
    # Uncomment to reach the API directly from the host:
    # ports:
    #   - "3001:3001"

  web:
    build:
      context: .
      dockerfile_inline: |
        FROM node:22-bookworm-slim AS builder

        ENV COREPACK_ENABLE_DOWNLOAD_PROMPT=0
        RUN corepack enable

        WORKDIR /repo

        COPY package.json pnpm-lock.yaml pnpm-workspace.yaml tsconfig.base.json ./
        COPY apps/desktop/package.json apps/desktop/
        COPY packages/shared/package.json packages/shared/
        # The desktop app consumes @openfinance/shared via a Vite alias (not a
        # workspace dependency), so install shared's deps explicitly too.
        RUN pnpm install --frozen-lockfile --filter openfinance-desktop... --filter @openfinance/shared

        COPY packages/shared packages/shared
        COPY apps/desktop apps/desktop

        # Empty VITE_API_URL = same-origin requests; Nginx proxies /api to the server
        ENV VITE_API_URL=""
        RUN pnpm --filter openfinance-desktop build

        FROM nginx:1.27-alpine
        COPY --from=builder /repo/apps/desktop/dist /usr/share/nginx/html
        EXPOSE 80
    configs:
      - source: nginx_conf
        target: /etc/nginx/conf.d/default.conf
    ports:
      - "${WEB_PORT:-3002}:80"
    depends_on:
      server:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-openfinance}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Run ./scripts/deploy.sh to generate .env}
      POSTGRES_DB: ${POSTGRES_DB:-openfinance}
    volumes:
      - pgdata:/var/lib/postgresql/data
    # Uncomment to reach PostgreSQL from the host (e.g. for `pnpm dev`):
    # ports:
    #   - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-openfinance}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

configs:
  nginx_conf:
    content: |
      server {
          listen 80;
          server_name _;

          root /usr/share/nginx/html;
          index index.html;

          # Document uploads go through /api — allow reasonably large files
          client_max_body_size 50m;

          gzip on;
          gzip_types text/css application/javascript application/json image/svg+xml;

          location /api/ {
              proxy_pass http://server:3001;
              proxy_http_version 1.1;
              proxy_set_header Host $$host;
              proxy_set_header X-Real-IP $$remote_addr;
              proxy_set_header X-Forwarded-For $$proxy_add_x_forwarded_for;
              proxy_set_header X-Forwarded-Proto $$scheme;
              # AI chat responses stream — don't buffer them
              proxy_buffering off;
              proxy_read_timeout 300s;
          }

          location = /health {
              proxy_pass http://server:3001/health;
          }

          location / {
              try_files $$uri $$uri/ /index.html;
          }
      }

volumes:
  pgdata:
  uploads:
  chat-memories:
